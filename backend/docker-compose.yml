services:
  db:
    image: mysql:8.0
    container_name: mysql-db
    environment:
      MYSQL_DATABASE: revplay_db
      MYSQL_ROOT_PASSWORD: Prasad@666
    #  Notice I completely removed the 'ports' section from here!
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pPrasad@666"]
      timeout: 10s
      retries: 10

  backend:
    build: .
    container_name: spring-backend
    restart: on-failure
    ports:
      - "8080:8080"  # We still need this one so your browser can see Spring Boot!
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/revplay_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&createDatabaseIfNotExist=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: Prasad@666
    depends_on:
      db:
        condition: service_healthy

  #  THIS IS YOUR BRAND NEW FRONTEND SECTION
  frontend:
    build: ../frontend
    container_name: angular-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  db_data: