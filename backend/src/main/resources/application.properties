spring.application.name=demo

# -----------------------------
# JWT Configuration
# -----------------------------
jwt.secret=RevPlaySuperSecretKeyForJsonWebTokens1234567890
jwt.expiration=86400000

# -----------------------------
# Database Connection
# -----------------------------
spring.datasource.url=jdbc:mysql://localhost:3306/revplay_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
